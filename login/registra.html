<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sign In</title>
</head>
<body>
    <h1>Cinema Palladino</h1>
    <form action="#" method="post">
        <div class="accedi">
            <h1>Sign In</h1>
        </div>
        <div class="campi_inserimento_credenziali">
            <label>Nome utente</label>
            <input type="text" required name="nick">
        </div>
        <div class="campi_inserimento_credenziali">
            <label>Email</label>
            <input type="email" required name="email">
        </div>
        <div class="campi_inserimento_credenziali">
            <label>Password</label>
            <input type="password" required name="pass">
        </div>
        <div class="campi_inserimento_credenziali">
            <label>Conferma password</label>
            <input type="password" required name="conferma_pass">
        </div>
        <div class="pulsanti">
            <input type="submit" value="CREA ACCOUNT">
            <a href="accesso.html">TORNA AD ACCEDI</a>
        </div>
    </form>
</body>
</html>
